<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#06060a">
  <title>Aurora — Your Library</title>
  <meta name="description" content="Search music and manage your Aurora subscriptions.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  <div class="aurora" aria-hidden="true"></div>
  <div class="aurora-grid" aria-hidden="true"></div>

  <!-- Top navigation -->
  <header class="nav">
    <a class="brand" href="main.html" aria-label="Aurora home">
      <span class="brand-mark" id="brandMark"></span> Aurora
    </a>
    <div class="nav-user">
      <div class="who" id="who">
        <small>Signed in as</small>
        <strong id="userName">Loading…</strong>
      </div>
      <div class="avatar" id="avatar" aria-hidden="true">A</div>
      <button class="btn btn-ghost btn-sm" id="logoutBtn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/></svg>
        Log out
      </button>
    </div>
  </header>

  <main id="main" class="container page">
    <!-- Hero + search -->
    <section class="hero">
      <h1>Find your next <span class="gradient-text">favourite track</span></h1>
      <p>Search the catalogue by title, release year, or artist — then add what you love to your library.</p>
    </section>

    <form class="search-card glass" id="searchForm" role="search" aria-label="Search music">
      <div class="search-grid">
        <div class="field">
          <label for="title">Title</label>
          <input class="input no-icon" type="text" id="title" placeholder="e.g. Bohemian Rhapsody">
        </div>
        <div class="field">
          <label for="year">Year</label>
          <input class="input no-icon" type="text" id="year" inputmode="numeric" placeholder="e.g. 1975">
        </div>
        <div class="field">
          <label for="artist">Artist</label>
          <input class="input no-icon" type="text" id="artist" placeholder="e.g. Queen">
        </div>
        <button class="btn" id="searchBtn" type="submit">
          <span class="btn-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17" aria-hidden="true" style="margin-right:7px;vertical-align:-3px;"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>Search
          </span>
          <span class="spinner" aria-hidden="true"></span>
        </button>
      </div>
    </form>

    <!-- Search results -->
    <section class="section" id="resultsSection" hidden>
      <div class="section-head">
        <h2>Search results <span class="count-pill" id="resultsCount">0</span></h2>
      </div>
      <div class="grid" id="queryResults" aria-live="polite"></div>
    </section>

    <!-- Library -->
    <section class="section" id="librarySection">
      <div class="section-head">
        <h2>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          Your library <span class="count-pill" id="libraryCount">0</span>
        </h2>
      </div>
      <div class="grid" id="subscriptionsList" aria-live="polite"></div>
    </section>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
